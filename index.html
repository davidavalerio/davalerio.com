    <style>
        :root {

            --purple-400: #5F2D9E;
            --purple-300: #7851A9;
            --purple-200: #DFC4FF;

            --color-text: #333;
            --color-text-heading: var(--purple-500);

        * {

        }

            font-weight: 300;
            color: var(--color-text);
            line-height: 1.5;
            background: var(--color-bg);

            min-height: 100vh;
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        a:focus-visible {

        .card {
            text-align: center;
            max-width: 480px;

        .name {

            font-weight: 700;
            color: var(--color-text-heading);
            letter-spacing: 0.02em;
            margin-bottom: 0.5rem;
        }

            color: var(--color-text-secondary);
            font-weight: 400;
            margin-bottom: 2rem;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem 1.75rem;
            list-style: none;
        }

        .links a {
            color: var(--color-link);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            transition: color 0.2s, border-color 0.2s;
            padding-bottom: 2px;
            border-bottom: 1px solid transparent;
        }

        .links a:hover {
            color: var(--purple-500);
            border-bottom-color: var(--gold-400);
        }

        @media (max-width: 480px) {
            .headshot {
                width: 120px;
                height: 120px;
            }

            .links {

            }
